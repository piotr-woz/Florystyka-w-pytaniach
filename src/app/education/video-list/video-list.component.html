<div class="container video-list" animate.enter="entering" animate.leave="leaving">
  <header class="video_list_header">
    <span>Edukacja florystyczna z </span><span>{{ playlistAuthor() }}</span>
  </header>

  <div class="video_list_box">
    <div class="video_list row">
      @for (item of playlistItems(); track item.id) {
      <section class="single_video col-sm-6 col-md-4 col-lg-3">
        <a routerLink="/video-list/video" [queryParams]="{ id: item.snippet.resourceId.videoId }">
          <img class="thumbnail" [src]="item.snippet.thumbnails.medium.url" [alt]="item.snippet.title" />
        </a>
      </section>
      }
    </div>
  </div>

  <a routerLink="/home" class="back-button">
    <span class="material-symbols-outlined back-button__icon">arrow_back_ios</span>
  </a>
</div>
